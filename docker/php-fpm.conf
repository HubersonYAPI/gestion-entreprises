; ============================================================
; docker/php-fpm.conf
; Configuration du pool PHP-FPM
; ============================================================

[www]
user  = www-data
group = www-data

; Écoute sur le socket TCP (Nginx communique via 127.0.0.1:9000)
listen = 127.0.0.1:9000

; Gestion dynamique du nombre de workers
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500

; Logs vers stderr (visible dans les logs Render)
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors]  = on

; Timeout
request_terminate_timeout = 300
