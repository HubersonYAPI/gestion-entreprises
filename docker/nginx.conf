# ============================================================
# docker/nginx.conf — VERSION CORRIGÉE pour Render
# ============================================================

server {
    listen 10000;
    server_name _;

    root  /var/www/html/public;
    index index.php index.html;

    # Upload max (documents)
    client_max_body_size 20M;

    # Logs visibles dans Render
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── IMPORTANT : Render est derrière un reverse proxy ──────
    # Sans ça, les redirections HTTPS → HTTP échouent
    # et les sessions peuvent être marquées "non sécurisées"
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;

    # ── Gzip (performances) ───────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Sécurité headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Route principale Laravel ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;

        # Transmettre HTTPS à Laravel (pour les redirections et cookies)
        fastcgi_param           HTTPS on;
        fastcgi_param           HTTP_X_FORWARDED_PROTO https;

        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ── Assets Vite (cache long) ──────────────────────────────
    location /build/ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        try_files          $uri =404;
    }

    # ── Storage public ────────────────────────────────────────
    location /storage/ {
        expires     7d;
        add_header  Cache-Control "public";
        try_files   $uri =404;
    }

    # ── Bloquer fichiers cachés ───────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Bloquer fichiers sensibles ────────────────────────────
    location ~* \.(env|log|htaccess|git)$ {
        deny all;
        return 404;
    }
}