# ============================================================
# docker/nginx.conf
# Serveur Nginx pour Laravel — port 10000 (requis par Render)
# ============================================================

server {
    listen 10000;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Taille max d'upload (pour les documents)
    client_max_body_size 20M;

    # Logs
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Gestion des requêtes Laravel (routage via index.php)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Fichiers PHP → PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Cache navigateur pour les assets compilés par Vite
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fichiers uploadés (storage/app/public → public/storage)
    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Bloquer l'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Bloquer l'accès direct aux fichiers sensibles
    location ~* \.(env|log|htaccess)$ {
        deny all;
        return 404;
    }
}
